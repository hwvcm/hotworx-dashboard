<style>

.lower-schedule{display:grid;grid-template-columns:32% 66%;gap:2%;min-height:0}.countdown{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:radial-gradient(circle at 50% 4%,rgba(242,105,34,.28),transparent 56%),linear-gradient(180deg,rgba(51,51,52,.55),rgba(3,3,3,.96));border:1px solid var(--line);min-height:0}.count-label{font-family:Arial Black,Arial,sans-serif;font-size:.82vw;letter-spacing:.16em;text-transform:uppercase;color:var(--stone)}.count-num{margin-top:.38vw;font-family:Arial Black,Impact,sans-serif;font-size:5.15vw;line-height:.84;color:var(--orange);letter-spacing:-.065em}.count-num span{color:#fff;font-size:1.35vw;letter-spacing:.02em;margin-left:.12em}.count-time{margin-top:.66vw;font-family:Arial Black,Arial,sans-serif;color:#fff;font-size:.94vw;letter-spacing:.1em;text-transform:uppercase}

.hero{position:relative;overflow:hidden;background:#090909;box-shadow:0 30px 80px rgba(0,0,0,.50);min-height:0}.hero-media{position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.72),rgba(0,0,0,.12) 52%,rgba(0,0,0,.40)),linear-gradient(135deg,#1b1b1b,#050505);background-size:cover;background-position:center}.hero-media.no-image:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,#F26922 0%,#FFBD00 30%,#FF0500 100%);opacity:.92}.hero-media.no-image:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 75% 35%,rgba(255,255,255,.18),transparent 24%),repeating-radial-gradient(ellipse at 70% 50%,transparent 0 28px,rgba(255,255,255,.17) 30px 33px,transparent 35px 58px);opacity:.45}.hero-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.82;display:none}.hero-shade{position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.80) 0%,rgba(0,0,0,.43) 45%,rgba(0,0,0,.18) 100%),linear-gradient(180deg,rgba(0,0,0,.10),rgba(0,0,0,.72))}

.hero-bar{position:relative;z-index:2;height:19%;display:grid;grid-template-columns:1fr auto;align-items:center;gap:1vw;padding:0 5%;background:rgba(0,0,0,.68);border-top:1px solid rgba(230,231,232,.15)}.message{font-family:Arial Black,Arial,sans-serif;font-size:1.05vw;line-height:1.25;letter-spacing:.08em;text-transform:uppercase;color:#fff}.insta{font-family:Arial Black,Arial,sans-serif;font-size:.98vw;letter-spacing:.08em;text-transform:uppercase;color:var(--orange)}
.footer{display:grid;grid-template-columns:44% 56%;align-items:center;border-top:1px solid rgba(230,231,232,.15)}.timeline{height:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:1.2%;align-items:center}.time-block{height:74%;display:grid;grid-template-rows:36% 64%;background:rgba(255,255,255,.045);border:1px solid rgba(230,231,232,.12);overflow:hidden}.time-block.current{border-color:rgba(242,105,34,.8);box-shadow:0 0 18px rgba(242,105,34,.18)}.time-label{display:flex;align-items:center;justify-content:center;background:var(--stone);color:#111;font-family:Arial Black,Arial,sans-serif;font-size:.72vw;text-transform:uppercase}.time-block.current .time-label{background:linear-gradient(90deg,var(--orange),var(--red));color:#fff}.time-copy{display:flex;align-items:center;justify-content:center;text-align:center;padding:.35vw;font-family:Arial Black,Arial,sans-serif;font-size:.58vw;line-height:1.15;text-transform:uppercase;color:#fff}.footer-cta{justify-self:end;background:linear-gradient(90deg,var(--orange),var(--red));padding:.92vw 2.8vw;transform:skew(-15deg);max-width:96%}.footer-cta span{display:block;transform:skew(15deg);font-family:Arial Black,Arial,sans-serif;font-size:1.18vw;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.status{position:fixed;z-index:50;left:10px;bottom:10px;padding:7px 9px;max-width:560px;display:none;background:rgba(0,0,0,.82);border:1px solid #666;color:#fff;border-radius:8px;font-family:Arial,sans-serif;font-size:11px}
</style>

<body>
<main class="stage">
  <header class="header"><div class="logo"><img src="https://drive.google.com/thumbnail?id=1mxTiop_YP2S7JUP9p-F_dzphfEzbnYWs&sz=w1200" alt="HOTWORX" /></div><div class="brand-line">24 Hour Infrared Fitness Studio</div><div class="clock"><div class="clock-time" id="clockTime">--:-- <span>--</span></div><div class="clock-date" id="clockDate">---</div></div></header>

<script>
const SHEET_ID="1MTm6xly2y9TyHA5FKu5BBGWm_DfVoW1IL8NVBBS06Cw";
const USE_EMBEDDED_FALLBACK=true;
const EMBEDDED={
  promotions:[

    {Active:true, Priority:2, Headline:"More Workout, Less Time", Subheadline:"Join today and start earning the burn", ImageKey:"Hero1"},

  ],

    {Active:true, Event:"Detox Day", Date:"June 12", Description:"Cold plunge and recovery event", ImageKey:"Hero4"}
  ],
  messages:[
    {Active:true, Message:"Book your next session in the HOTWORX app"},

  ],
  images:{
    Hero1:"https://drive.google.com/file/d/1hrgflGvpnQAcHEhEP3_hWx_ZA0oPF7NI/view?usp=sharing",
    Hero2:"https://drive.google.com/file/d/1P2871yoFpIX8Cc_fKV6gsGrn55oR8Axl/view?usp=sharing",
    Hero3:"https://drive.google.com/file/d/1mcPLE2ovNaCLkYovTYRUegqDITwS2zsF/view?usp=sharing",
    Hero4:"https://drive.google.com/file/d/1Obvlvh6ur9pb1yxa1NgQwHsA4Vv2GcSc/view?usp=sharing"
  },
  settings:{"Rotation Seconds":"18","Instagram":"@hotworxstatecollege","CTA":"Ask About Sweat Elite Membership"}
};
const SHEETS={promotions:"Promotions",spotlights:"Member Spotlights",events:"Events",messages:"Studio Messages",images:"Images",settings:"Dashboard Settings"};
const ISO_START_TIMES=["6:00 AM","6:45 AM","7:30 AM","8:15 AM","9:00 AM","9:45 AM","10:30 AM","11:15 AM","12:00 PM","12:45 PM","1:30 PM","2:15 PM","3:00 PM","3:45 PM","4:30 PM","5:15 PM","6:00 PM","6:45 PM","7:30 PM","8:15 PM","9:00 PM","9:45 PM","10:30 PM","11:15 PM","12:00 AM","12:45 AM","1:30 AM","2:15 AM","3:00 AM","3:45 AM","4:30 AM","5:15 AM"];
const ISO_SAUNAS=[{sauna:1,rotation:["ISO","BUNS"]},{sauna:2,rotation:["YOGA","PILATES"]},{sauna:3,rotation:["STRETCH","BARRE NONE"]},{sauna:4,rotation:["WARRIOR","CORE","BANDS"]}];
const HIIT_SAUNAS=[{sauna:5,workout:"CYCLE"},{sauna:6,workout:"CYCLE"},{sauna:7,workout:"BLAST"},{sauna:8,workout:"THUNDER"}];
const fallbackContent=[{type:"HOTWORX",headline:"More Workout, Less Time",subheadline:"24 Hour Infrared Fitness Studio",detail:"Earn the Burn",imageKey:"Hero1"}];
let sheetData={promotions:[],spotlights:[],events:[],messages:[],images:{},settings:{"Rotation Seconds":"18","Instagram":"@hotworxstatecollege","CTA":"Ask About Sweat Elite Membership"}};
const DAY_START_MINUTES=360, ISO_BLOCK=45; let testDate=null,heroIndex=0,lastHeroSwap=0;

function applyEmbedded(){sheetData.promotions=activeRows(EMBEDDED.promotions);sheetData.spotlights=activeRows(EMBEDDED.spotlights);sheetData.events=activeRows(EMBEDDED.events);sheetData.messages=activeRows(EMBEDDED.messages);sheetData.images={};Object.entries(EMBEDDED.images).forEach(([k,v])=>sheetData.images[k]=normalizeAssetUrl(v));sheetData.settings=Object.assign(sheetData.settings,EMBEDDED.settings);}
function csvUrl(sheet){return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}&cacheBust=${Date.now()}`;}
async function reloadContent(){
  setStatus("Loading Google Sheet content...");
  try{
    const [promotions,spotlights,events,messages,images,settings]=await Promise.all([loadSheet(SHEETS.promotions),loadSheet(SHEETS.spotlights),loadSheet(SHEETS.events),loadSheet(SHEETS.messages),loadSheet(SHEETS.images),loadSheet(SHEETS.settings).catch(()=>[])]);
    sheetData.promotions=activeRows(promotions);sheetData.spotlights=activeRows(spotlights);sheetData.events=activeRows(events);sheetData.messages=activeRows(messages);sheetData.images=imageMap(images);sheetData.settings=Object.assign(sheetData.settings,settingsMap(settings));
    if(!sheetData.promotions.length && USE_EMBEDDED_FALLBACK) applyEmbedded();
    document.getElementById("instagram").textContent=sheetData.settings["Instagram"]||"@HOTWORXSTATECOLLEGE";document.getElementById("footerCta").textContent=sheetData.settings["CTA"]||"Ask About Sweat Elite Membership";
    setStatus(`Loaded sheet. Image keys found: ${Object.keys(sheetData.images).join(", ") || "none"}`);
    renderHero(true);
  }catch(e){
    console.error(e);
    if(USE_EMBEDDED_FALLBACK){applyEmbedded();document.getElementById("instagram").textContent=sheetData.settings["Instagram"];document.getElementById("footerCta").textContent=sheetData.settings["CTA"];setStatus("Live sheet could not load from local file. Using embedded data from uploaded XLSX. Host this file online for live Google Sheet sync.");renderHero(true);}
    else {setStatus("Could not load sheet. Make sure sharing is public.");renderHero(true);}
  }
}
async function loadSheet(sheet){const res=await fetch(csvUrl(sheet));if(!res.ok)throw new Error("Failed to load "+sheet);return parseCSV(await res.text());}
function parseCSV(text){const rows=[];let row=[],cell="",q=false;for(let i=0;i<text.length;i++){const ch=text[i],n=text[i+1];if(ch=='"'&&q&&n=='"'){cell+='"';i++;}else if(ch=='"'){q=!q;}else if(ch==","&&!q){row.push(cell);cell="";}else if((ch=="\n"||ch=="\r")&&!q){if(ch=="\r"&&n=="\n")i++;row.push(cell);rows.push(row);row=[];cell="";}else{cell+=ch;}}if(cell||row.length){row.push(cell);rows.push(row);}const h=(rows.shift()||[]).map(x=>x.trim());return rows.filter(r=>r.some(c=>String(c).trim()!="")).map(r=>{const o={};h.forEach((k,i)=>o[k]=(r[i]||"").trim());return o;});}
function activeRows(rows){return rows.filter(r=>String(r.Active||r.active||"TRUE").toLowerCase()!="false");}
function pick(row,names){for(const n of names){if(row[n]!==undefined && row[n]!==null && row[n]!=="")return row[n];}return "";}
function imageMap(rows){const map={};rows.forEach(r=>{const key=pick(r,["Key","key","ImageKey","Image Key","Name","name"]);const url=pick(r,["ImageURL","Image URL","AssetURL","Asset URL","URL","Url","url","Link","link"]);if(key&&url)map[key]=normalizeAssetUrl(url);});return map;}
function settingsMap(rows){const map={};rows.forEach(r=>{const k=pick(r,["Setting","setting","Key","key"]);const v=pick(r,["Value","value"]);if(k)map[k]=v;});return map;}
function normalizeAssetUrl(url){if(!url)return "";const d=url.match(/drive\.google\.com\/file\/d\/([^/]+)/);if(d)return `https://drive.google.com/thumbnail?id=${d[1]}&sz=w2400`;const o=url.match(/[?&]id=([^&]+)/);if(url.includes("drive.google.com")&&o)return `https://drive.google.com/thumbnail?id=${o[1]}&sz=w2400`;return url;}
function customerType(headline,type){const h=String(headline||"").toLowerCase(),t=String(type||"").toLowerCase();if(t.includes("event"))return"Upcoming Event";if(t.includes("spotlight")||h.includes("member"))return"Member Spotlight";if(h.includes("refer"))return"Member Perk";if(h.includes("info"))return"Studio Info";if(h.includes("earn")||h.includes("burn")||h.includes("workout"))return"HOTWORX";return"Studio News";}
function getNow(){return testDate||new Date();} function minutesSinceMidnight(d){return d.getHours()*60+d.getMinutes();} function scheduleMins(){let m=minutesSinceMidnight(getNow())-DAY_START_MINUTES;if(m<0)m+=1440;return m;} function isoIndex(offset=0){return(Math.floor(scheduleMins()/ISO_BLOCK)+offset+ISO_START_TIMES.length)%ISO_START_TIMES.length;} function isoWorkout(s,idx){return s.rotation[idx%s.rotation.length];}
function render(){renderClock();renderSchedule();renderHero();renderMessage();}
function renderClock(){const d=getNow();const p=d.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"}).split(" ");document.getElementById("clockTime").innerHTML=`${p[0]} <span>${p[1]||""}</span>`;document.getElementById("clockDate").textContent=d.toLocaleDateString([],{weekday:"long",month:"long",day:"numeric"}).toUpperCase();}
function renderSchedule(){const idx=isoIndex(),next=isoIndex(1),mins=ISO_BLOCK-(scheduleMins()%ISO_BLOCK);document.getElementById("nowTimeLabel").textContent=ISO_START_TIMES[idx];document.getElementById("countNumber").innerHTML=`${mins}<span>MIN</span>`;document.getElementById("nextTimeLabel").textContent=ISO_START_TIMES[next];const nowGrid=document.getElementById("nowGrid");nowGrid.innerHTML="";ISO_SAUNAS.forEach(s=>nowGrid.appendChild(workoutCard(s.sauna,isoWorkout(s,idx))));HIIT_SAUNAS.forEach(s=>nowGrid.appendChild(workoutCard(s.sauna,s.workout)));const nextGrid=document.getElementById("nextGrid");nextGrid.innerHTML="";ISO_SAUNAS.forEach(s=>nextGrid.appendChild(nextCard(s.sauna,isoWorkout(s,next))));HIIT_SAUNAS.forEach(s=>nextGrid.appendChild(nextCard(s.sauna,s.workout)));const timeline=document.getElementById("timeline");timeline.innerHTML="";for(let o=0;o<4;o++){const bi=isoIndex(o);const copy=ISO_SAUNAS.map(s=>isoWorkout(s,bi)).join(" • ");const div=document.createElement("div");div.className="time-block"+(o===0?" current":"");div.innerHTML=`<div class="time-label">${o===0?"Now":ISO_START_TIMES[bi]}</div><div class="time-copy">${copy}</div>`;timeline.appendChild(div);}}
function workoutCard(sauna,workout){const d=document.createElement("div");d.className="workout-card";d.innerHTML=`<div class="sauna">Sauna ${sauna}</div><div class="workout">${workout}</div>`;return d;} function nextCard(sauna,workout){const d=document.createElement("div");d.className="next-card";d.innerHTML=`<div class="next-number">${sauna}</div><div class="next-workout">${workout}</div>`;return d;}
function buildHeroItems(){const items=[];let imageCycle=0;const imageKeys=Object.keys(sheetData.images);function autoImageKey(r){return pick(r,["ImageKey","Image Key","Image"]) || (imageKeys.length ? imageKeys[(imageCycle++)%imageKeys.length] : "");}
sheetData.promotions.forEach(r=>{const headline=pick(r,["Headline","Title","Promotion","Name"])||"Studio News";items.push({type:customerType(headline,"promotion"),headline,subheadline:pick(r,["Subheadline","Sub Headline","Description"]),detail:pick(r,["Detail","Date","EndDate","End Date"]),imageKey:autoImageKey(r),assetUrl:pick(r,["ImageURL","Image URL","AssetURL","Asset URL","URL","Link"])});});
sheetData.spotlights.forEach(r=>{const headline=pick(r,["Name","Headline","Title"])||"Member Spotlight";items.push({type:"Member Spotlight",headline,subheadline:pick(r,["Achievement","Subheadline","Description"]),detail:pick(r,["Detail","Session Count","Date"]) ? `${pick(r,["Detail","Session Count","Date"])} sessions completed` : "",imageKey:autoImageKey(r),assetUrl:pick(r,["ImageURL","Image URL","AssetURL","Asset URL","URL","Link"])});});
sheetData.events.forEach(r=>{const headline=pick(r,["Event","Headline","Title","Name"])||"Upcoming Event";items.push({type:"Upcoming Event",headline,subheadline:pick(r,["Date","Subheadline","Sub Headline"]),detail:pick(r,["Description","Detail"]),imageKey:autoImageKey(r),assetUrl:pick(r,["ImageURL","Image URL","AssetURL","Asset URL","URL","Link"])});});
return items.length?items:fallbackContent;}
function renderHero(force=false){const seconds=parseInt(sheetData.settings["Rotation Seconds"]||"18",10),now=Date.now();if(!force&&now-lastHeroSwap<seconds*1000)return;const items=buildHeroItems();heroIndex=force?0:(heroIndex+1)%items.length;lastHeroSwap=now;const item=items[heroIndex]||fallbackContent[0];document.getElementById("heroType").textContent=item.type||"Studio News";document.getElementById("heroHeadline").textContent=item.headline||"More Workout, Less Time";document.getElementById("heroSubheadline").textContent=item.subheadline||"24 Hour Infrared Fitness Studio";document.getElementById("heroDetail").textContent=item.detail||"";const asset=normalizeAssetUrl(item.assetUrl||sheetData.images[item.imageKey]||"");applyAsset(asset);}
function applyAsset(url){const media=document.getElementById("heroMedia"),video=document.getElementById("heroVideo");video.pause();video.removeAttribute("src");video.style.display="none";if(!url){media.classList.add("no-image");media.style.backgroundImage="";return;}media.classList.remove("no-image");const isVideo=/\.(mp4|webm|ogg)(\?|$)/i.test(url);if(isVideo){video.src=url;video.style.display="block";video.play().catch(()=>{});media.style.backgroundImage="";}else{media.style.backgroundImage=`linear-gradient(90deg,rgba(0,0,0,.72),rgba(0,0,0,.12) 52%,rgba(0,0,0,.40)),url("${url}")`;}}
function renderMessage(){const msgs=sheetData.messages.length?sheetData.messages:[{Message:"Book your next session in the HOTWORX app"}];const d=getNow(),idx=Math.floor((d.getMinutes()*60+d.getSeconds())/15)%msgs.length;const msg=msgs[idx];document.getElementById("studioMessage").textContent=pick(msg,["Message","Headline","Title","Description"])||"Book your next session in the HOTWORX app";}
function setTestTime(){const el=document.getElementById("testTime"); if(!el)return; const v=el.value;if(!v)return;const [h,m]=v.split(":").map(Number);testDate=new Date();testDate.setHours(h,m,0,0);render();} function clearTestTime(){testDate=null;const el=document.getElementById("testTime"); if(el)el.value="";render();}
function setStatus(msg){const s=document.getElementById("status");s.textContent=msg;s.style.display="block";clearTimeout(window.__statusTimer);window.__statusTimer=setTimeout(()=>s.style.display="none",10000);}
reloadContent();render();setInterval(render,1000);setInterval(reloadContent,5*60*1000);
</script>
